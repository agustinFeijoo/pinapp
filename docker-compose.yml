services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: clientes
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  spring:
    build: ./MS-A
    container_name: spring-app
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clientes
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password

  node:
    build: ./nodeJS
    container_name: node-bff
    ports:
      - "3000:3000"
    depends_on:
      - spring
    environment:
      MS_A_URL: http://spring:8080/api/clientes

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:3000
    container_name: react-frontend
    ports:
      - "8080:8080"
    depends_on:
      - node